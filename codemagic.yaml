workflows:
  android-build:
    name: Android APK Build (Capacitor)
    max_build_duration: 60

    environment:
      node: 18
      java: 17

    cache:
      cache_paths:
        - node_modules

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build project
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync android

      - name: Build APK
        script: cd android && ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/**/*.apk
